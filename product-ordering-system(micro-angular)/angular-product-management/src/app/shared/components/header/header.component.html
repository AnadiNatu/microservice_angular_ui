<!-- src/app/shared/components/header/header.component.html -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
  <div class="container-fluid px-4">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <div class="brand-icon bg-primary text-white rounded p-2">
        <i class="bi bi-box-seam fs-5"></i>
      </div>
      <span class="fw-bold text-primary">OrderFlow Pro</span>
    </a>

    <!-- Right section -->
    <div class="ms-auto d-flex align-items-center gap-3">

      @if (user(); as u) {

        <!-- Name + role (hidden on mobile) -->
        <div class="d-none d-md-block text-end">
          <div class="fw-semibold small text-dark">{{ getDisplayName() }}</div>
          <div class="text-muted" style="font-size:0.75rem;">
            <!-- Show "Admin" or "User" from first role -->
            {{ u.roles[0]?.replace('ROLE_','') | titlecase }} Account
          </div>
        </div>

        <!-- Avatar dropdown -->
        <div class="dropdown">
          <button class="btn btn-link p-0 border-0" type="button"
            data-bs-toggle="dropdown" aria-expanded="false">

            @if (getAvatarUrl()) {
              <!-- Cloudinary profile picture -->
              <img [src]="getAvatarUrl()!" [alt]="getDisplayName()"
                class="rounded-circle border border-2 border-primary"
                width="42" height="42" style="object-fit:cover;cursor:pointer;">
            } @else {
              <!-- Initials fallback -->
              <div class="rounded-circle border border-2 border-primary d-flex
                          align-items-center justify-content-center bg-primary
                          text-white fw-bold"
                style="width:42px;height:42px;cursor:pointer;font-size:0.9rem;">
                {{ getInitials() }}
              </div>
            }
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2"
            style="min-width:220px;">

            <!-- Mobile: show name + email -->
            <li class="d-md-none px-3 py-2 border-bottom">
              <div class="fw-semibold">{{ getDisplayName() }}</div>
              <div class="small text-muted">{{ u.email }}</div>
            </li>

            <li>
              <a class="dropdown-item py-2" (click)="navigateToProfile()"
                style="cursor:pointer;">
                <i class="bi bi-person me-2 text-primary"></i>My Profile
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <a class="dropdown-item py-2 text-danger"
                (click)="logout()" style="cursor:pointer;">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </li>
          </ul>
        </div>
      }

    </div>
  </div>
</nav>
