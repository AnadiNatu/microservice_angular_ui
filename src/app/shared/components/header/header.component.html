<!-- Application Header -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
  <div class="container-fluid px-4">
    <!-- Brand Logo -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/auth/home">
      <div class="brand-icon text-white rounded p-2">
        <i class="bi bi-box-seam fs-5"></i>
      </div>
      <span class="fw-bold text-primary">OrderFlow Pro</span>
    </a>

    <!-- User Section -->
    <div class="ms-auto d-flex align-items-center gap-3">

      @if (currentUser) {
        <!-- User Info (hidden on mobile) -->
        <div class="d-none d-md-block text-end">
          <div class="fw-semibold small text-dark">{{ getFullName() }}</div>
          <div class="text-muted" style="font-size: 0.75rem;">
            {{ currentUser.role | titlecase }} Account
          </div>
        </div>

        <!-- User Dropdown -->
        <div class="dropdown">
          <button
            class="btn btn-link p-0 border-0"
            type="button"
            id="userDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            @if (currentUser.avatar) {
              <img
                [src]="currentUser.avatar"
                [alt]="getFullName()"
                class="rounded-circle border border-2 border-primary"
                width="42"
                height="42"
                style="object-fit: cover; cursor: pointer;">
            } @else {
              <div
                class="avatar-fallback rounded-circle border border-2 border-primary d-flex align-items-center justify-content-center bg-primary text-white fw-bold"
                style="width: 42px; height: 42px; cursor: pointer;">
                {{ getInitials() }}
              </div>
            }
          </button>

          <ul
            class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2"
            aria-labelledby="userDropdown"
            style="min-width: 220px;">

            <!-- Mobile-only user info -->
            <li class="d-md-none px-3 py-2 border-bottom">
              <div class="fw-semibold">{{ getFullName() }}</div>
              <div class="small text-muted">{{ currentUser.email }}</div>
            </li>

            <li>
              <a class="dropdown-item py-2" routerLink="/admin/profile">
                <i class="bi bi-person me-2 text-primary"></i>
                My Profile
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <!-- Logout button — always visible when user is set -->
            <li>
              <button
                class="dropdown-item py-2 text-danger w-100 text-start border-0 bg-transparent"
                type="button"
                (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>
                Logout
              </button>
            </li>
          </ul>
        </div>
      } @else {
        <!-- Show login button when no user -->
        <a class="btn btn-primary btn-sm" routerLink="/auth/login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </a>
      }

    </div>
  </div>
</nav>
