<div class="sidebar bg-white border-end vh-100 d-flex flex-column">

  <div class="sidebar-header p-3 border-bottom">
    <h6 class="mb-0 text-muted text-uppercase fw-semibold">
      Navigation
    </h6>
  </div>

  <nav class="sidebar-nav flex-grow-1 overflow-auto">

    <ul class="nav flex-column p-2">

      @for (item of menuItems; track item.route) {

        <li class="nav-item mb-1">

          @if (!item.children) {

            <a
              [routerLink]="item.route"
              routerLinkActive="active"
              [class.active]="isActive(item.route)"
              class="nav-link d-flex align-items-center gap-3 rounded py-2 px-3">

              <i [class]="'bi ' + item.icon + ' fs-5'"></i>

              <span>{{ item.label }}</span>

            </a>

          }

          @if (item.children) {

            <div class="submenu-parent">

              <div
                class="nav-link d-flex align-items-center gap-3 rounded py-2 px-3"
                data-bs-toggle="collapse"
                [attr.data-bs-target]="'#submenu-' + item.label"
                aria-expanded="false">

                <i [class]="'bi ' + item.icon + ' fs-5'"></i>

                <span class="flex-grow-1">
                  {{ item.label }}
                </span>

                <i class="bi bi-chevron-down submenu-arrow"></i>

              </div>

              <div
                class="collapse submenu"
                [id]="'submenu-' + item.label">

                <ul class="nav flex-column ps-4">

                  @for (child of item.children; track child.route) {

                    <li class="nav-item">

                      <a
                        [routerLink]="child.route"
                        routerLinkActive="active"
                        [class.active]="isActive(child.route)"
                        class="nav-link d-flex align-items-center gap-2 rounded py-2 px-3">

                        <i [class]="'bi ' + child.icon"></i>

                        <span>{{ child.label }}</span>

                      </a>

                    </li>

                  }

                </ul>

              </div>

            </div>

          }

        </li>

      }

    </ul>

  </nav>

  <div class="sidebar-footer p-3 border-top">

    <button
      type="button"
      class="btn btn-outline-danger w-100"
      (click)="logout()">

      <i class="bi bi-box-arrow-right me-2"></i>
      Logout

    </button>

  </div>

</div>
